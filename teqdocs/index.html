<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeqDocs">
<title>TeqDocs — Markdown Reader</title>
<link rel="manifest" href="manifest.json">
<!-- Highlight.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --text: #e8e6df;
    --muted: #7a7d8e; --accent: #e8a44a; --accent-dim: #b57d30;
    --code-bg: #141720; --link: #6db3f2; --danger: #e05c5c;
    --font-body: 'Georgia','Times New Roman',serif;
    --font-ui: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono: 'Fira Code','Cascadia Code','Consolas',monospace;
    --font-size: 17px; --line-height: 1.75; --max-width: 680px;
    --toolbar-h: 64px; --radius: 10px;
  }
  .light {
    --bg: #faf8f3; --surface: #ffffff; --border: #e0ddd5; --text: #1a1a1a;
    --muted: #888; --accent: #b06e1e; --accent-dim: #c97f2a;
    --code-bg: #f0ede6; --link: #1a6fb5;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: var(--font-size); scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100dvh; transition: background 0.2s, color 0.2s; overflow-x: hidden; }

  #drop-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(15,17,23,0.92); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; backdrop-filter: blur(4px); }
  #drop-overlay.active { display: flex; }
  #drop-overlay .drop-icon { font-size: 3rem; }
  #drop-overlay p { color: var(--accent); font-size: 1.2rem; font-weight: 600; }

  .progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; z-index: 100; transition: width 0.1s linear; pointer-events: none; }

  /* HOME */
  #home { display: flex; flex-direction: column; min-height: 100dvh; padding-bottom: var(--toolbar-h); }
  .home-header { padding: 2rem 1.5rem 1rem; text-align: center; }
  .home-logo { width: 56px; height: 56px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1rem; box-shadow: 0 6px 24px rgba(232,164,74,0.25); }
  .home-title { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em; }
  .home-title span { color: var(--accent); }
  .home-sub { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }
  .home-tabs { display: flex; padding: 0 1.5rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .home-tab { flex: 1; padding: 10px; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; font-family: var(--font-ui); }
  .home-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; flex: 1; padding: 0 1.25rem 1rem; }
  .tab-panel.active { display: block; }
  .open-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem 0; }
  .open-btn { background: var(--accent); color: #0f1117; border: none; border-radius: var(--radius); padding: 13px 28px; font-size: 0.95rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; box-shadow: 0 4px 16px rgba(232,164,74,0.3); transition: transform 0.15s; }
  .open-btn:active { transform: scale(0.96); }
  .drop-hint { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .drop-hint::before, .drop-hint::after { content: '—'; opacity: 0.4; }
  .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; padding-left: 2px; }
  .file-list { display: flex; flex-direction: column; gap: 6px; }
  .file-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s; }
  .file-item:active { border-color: var(--accent); }
  .fi-icon { font-size: 1rem; flex-shrink: 0; }
  .fi-info { flex: 1; min-width: 0; }
  .fi-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fi-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .fi-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .fi-action { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 4px; border-radius: 6px; line-height: 1; transition: color 0.15s; }
  .fi-action:active { color: var(--accent); }
  .fi-action.del:active { color: var(--danger); }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.88rem; line-height: 1.6; }
  .empty-state .es-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .new-file-btn { width: 100%; background: var(--surface); border: 1px dashed var(--accent); border-radius: var(--radius); padding: 13px; font-size: 0.9rem; font-weight: 700; color: var(--accent); font-family: var(--font-ui); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; transition: background 0.15s; }
  .new-file-btn:active { background: var(--border); }

  /* EDITOR */
  #editor-screen { display: none; flex-direction: column; height: 100dvh; }
  #editor-screen.visible { display: flex; }
  .editor-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .editor-back { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1.2rem; padding: 4px; line-height: 1; flex-shrink: 0; }
  .editor-title-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 0.9rem; font-weight: 700; font-family: var(--font-ui); outline: none; min-width: 0; }
  .editor-title-input::placeholder { color: var(--muted); }
  .editor-save-btn { background: var(--accent); color: #0f1117; border: none; border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; flex-shrink: 0; transition: transform 0.15s; }
  .editor-save-btn:active { transform: scale(0.95); }
  .editor-dl-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 0.82rem; color: var(--muted); font-family: var(--font-ui); cursor: pointer; flex-shrink: 0; }
  .editor-dl-btn:active { border-color: var(--accent); color: var(--accent); }
  .fmt-bar { display: flex; gap: 2px; padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .fmt-bar::-webkit-scrollbar { display: none; }
  .fmt-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.82rem; font-weight: 700; font-family: var(--font-ui); padding: 5px 9px; border-radius: 6px; white-space: nowrap; line-height: 1; transition: background 0.12s, color 0.12s; }
  .fmt-btn:active { background: var(--border); color: var(--accent); }
  #md-editor { flex: 1; background: var(--bg); color: var(--text); border: none; outline: none; padding: 1.25rem; font-family: var(--font-mono); font-size: 0.9rem; line-height: 1.7; resize: none; width: 100%; -webkit-overflow-scrolling: touch; }
  #md-editor::placeholder { color: var(--muted); }
  .preview-toggle { display: flex; border-top: 1px solid var(--border); flex-shrink: 0; }
  .pv-btn { flex: 1; background: none; border: none; padding: 8px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); cursor: pointer; font-family: var(--font-ui); transition: color 0.15s, background 0.15s; }
  .pv-btn.active { color: var(--accent); background: var(--surface); }
  #editor-preview { display: none; flex: 1; overflow-y: auto; padding-bottom: 2rem; }
  #editor-preview.visible { display: block; }

  /* READER */
  #reader { display: none; padding-bottom: calc(var(--toolbar-h) + 1.5rem); }
  #reader.visible { display: block; }
  .doc-header { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1.2rem; padding: 4px; flex-shrink: 0; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .doc-filename { font-size: 0.82rem; font-weight: 600; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .doc-meta { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .doc-readtime { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; font-size: 0.68rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .doc-wordcount { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
  .doc-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .doc-action-btn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 4px 9px; font-size: 0.72rem; color: var(--muted); cursor: pointer; flex-shrink: 0; font-family: var(--font-ui); white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
  .doc-action-btn:active { border-color: var(--accent); color: var(--accent); }
  .doc-action-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,164,74,0.08); }

  /* Export menu */
  .export-menu { position: absolute; top: 100%; right: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; z-index: 200; display: none; flex-direction: column; gap: 2px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-width: 160px; }
  .export-menu.open { display: flex; }
  .export-item { background: none; border: none; cursor: pointer; color: var(--text); font-size: 0.85rem; font-family: var(--font-ui); padding: 9px 12px; border-radius: 7px; text-align: left; display: flex; align-items: center; gap: 8px; transition: background 0.12s; }
  .export-item:hover { background: var(--border); }
  .export-item:active { color: var(--accent); }

  /* Focus mode */
  body.focus-mode #toolbar { opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.3s; }
  body.focus-mode .doc-header { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  body.focus-mode #reader { padding-bottom: 2rem; }
  body.focus-mode:hover #toolbar, body.focus-mode:hover .doc-header,
  body.focus-mode.focus-peek #toolbar, body.focus-mode.focus-peek .doc-header { opacity: 1; pointer-events: all; }
  #toolbar { transition: opacity 0.3s, transform 0.3s; }
  .focus-hint { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(15,17,23,0.85); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 0.72rem; color: var(--muted); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.4s; white-space: nowrap; }
  .focus-hint.show { opacity: 1; }

  /* Markdown body */
  .md-body { max-width: var(--max-width); margin: 0 auto; padding: 1.75rem 1.25rem; font-family: var(--font-body); font-size: 1rem; line-height: var(--line-height); color: var(--text); }
  .md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6 { font-family: var(--font-ui); font-weight: 700; color: var(--accent); line-height: 1.3; margin-top: 2rem; margin-bottom: 0.6rem; letter-spacing: -0.02em; }
  .md-body h1 { font-size: 1.8rem; margin-top: 0.5rem; }
  .md-body h2 { font-size: 1.35rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
  .md-body h3 { font-size: 1.1rem; color: var(--accent-dim); }
  .md-body h4,.md-body h5,.md-body h6 { font-size: 1rem; color: var(--muted); }
  .md-body p { margin-bottom: 1rem; }
  .md-body a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
  .md-body strong { font-weight: 700; }
  .md-body em { font-style: italic; }
  .md-body ul,.md-body ol { padding-left: 1.4rem; margin-bottom: 1rem; }
  .md-body li { margin-bottom: 0.3rem; }
  .md-body blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 1rem 0; background: var(--surface); border-radius: 0 var(--radius) var(--radius) 0; color: var(--muted); font-style: italic; }
  .md-body code { font-family: var(--font-mono); font-size: 0.82em; background: var(--code-bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.15em 0.4em; color: #e06c75; }
  .md-body pre { margin: 1.2rem 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .md-body pre code { font-size: 0.83rem; line-height: 1.6; border-radius: 0; border: none; padding: 1rem 1.1rem; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--code-bg) !important; }
  /* Syntax highlight overrides for dark mode */
  .md-body pre .hljs { background: var(--code-bg) !important; padding: 1rem 1.1rem; }
  .light .md-body pre .hljs { background: #f0ede6 !important; }
  .md-body table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: 0.9rem; display: block; overflow-x: auto; }
  .md-body th { background: var(--surface); color: var(--accent); font-family: var(--font-ui); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--accent); }
  .md-body td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .md-body tr:last-child td { border-bottom: none; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  .md-body img { max-width: 100%; border-radius: var(--radius); margin: 1rem 0; height: auto; }
  .md-body input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; margin-right: 6px; cursor: default; vertical-align: middle; position: relative; top: -1px; }

  /* TOOLBAR */
  #toolbar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--toolbar-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 0.5rem; z-index: 90; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .tb-btn { flex: 1; background: none; border: none; color: var(--muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 2px; border-radius: 8px; transition: color 0.15s; -webkit-tap-highlight-color: transparent; font-family: var(--font-ui); }
  .tb-btn:active { color: var(--accent); }
  .tb-btn.tb-active { color: var(--accent); }
  .tb-btn .tb-icon { font-size: 1.25rem; line-height: 1; }
  .tb-btn .tb-label { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .tb-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

  /* Font popup */
  #font-popup { position: fixed; bottom: calc(var(--toolbar-h) + 10px); left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: none; align-items: center; gap: 12px; z-index: 95; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  #font-popup.open { display: flex; }
  #font-popup button { background: var(--border); border: none; cursor: pointer; color: var(--text); border-radius: 6px; width: 34px; height: 34px; font-size: 1rem; font-family: var(--font-ui); font-weight: 700; display: flex; align-items: center; justify-content: center; }
  #font-popup button:active { background: var(--accent); color: #000; }
  #font-size-display { font-size: 0.88rem; font-weight: 700; color: var(--text); min-width: 36px; text-align: center; font-family: var(--font-ui); }

  /* TOC */
  #toc-panel { position: fixed; inset: 0; background: var(--bg); z-index: 80; display: none; flex-direction: column; padding-bottom: var(--toolbar-h); }
  #toc-panel.open { display: flex; }
  .toc-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .toc-header h2 { font-family: var(--font-ui); font-size: 1rem; font-weight: 700; color: var(--accent); }
  .toc-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.3rem; padding: 4px; }
  .toc-list { overflow-y: auto; flex: 1; padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; }
  .toc-item { font-family: var(--font-ui); font-size: 0.88rem; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--text); transition: background 0.12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .toc-item:active { background: var(--border); }
  .toc-item[data-level="1"] { font-weight: 700; color: var(--accent); }
  .toc-item[data-level="2"] { padding-left: 22px; }
  .toc-item[data-level="3"] { padding-left: 36px; color: var(--muted); font-size: 0.82rem; }
  .toc-empty { color: var(--muted); font-size: 0.88rem; padding: 1rem; text-align: center; }

  /* Search */
  #search-panel { position: fixed; top: 0; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; z-index: 100; display: none; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  #search-panel.open { display: flex; }
  #search-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; font-family: var(--font-ui); padding: 8px 12px; outline: none; }
  #search-input:focus { border-color: var(--accent); }
  .search-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; }
  .search-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; font-family: var(--font-ui); }
  mark { background: rgba(232,164,74,0.35); color: var(--text); border-radius: 2px; padding: 0 2px; }
  mark.current { background: var(--accent); color: #000; }

  /* Modal */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
  #modal-overlay.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem; width: 100%; max-width: 480px; }
  .modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 1rem; }
  .modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; font-family: var(--font-ui); padding: 10px 12px; outline: none; margin-bottom: 1rem; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 11px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; border: none; }
  .modal-btn.primary { background: var(--accent); color: #0f1117; }
  .modal-btn.secondary { background: var(--border); color: var(--text); }

  /* Toast */
  #toast { position: fixed; bottom: calc(var(--toolbar-h) + 14px); left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 0.82rem; font-weight: 600; color: var(--text); z-index: 400; opacity: 0; transition: opacity 0.2s; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  #toast.show { opacity: 1; }

  /* Print styles for PDF export */
  @media print {
    #toolbar, #toc-panel, #search-panel, #font-popup, #modal-overlay, #toast, .doc-header, #home, #editor-screen, .progress-bar, #drop-overlay, .focus-hint { display: none !important; }
    #reader { display: block !important; padding: 0 !important; }
    .md-body { max-width: 100%; padding: 0; font-size: 12pt; color: #000; }
    .md-body h1,.md-body h2,.md-body h3,.md-body h4 { color: #000; }
    .md-body a { color: #000; text-decoration: underline; }
    .md-body pre, .md-body code { background: #f4f4f4 !important; color: #333 !important; border: 1px solid #ddd; }
    .md-body blockquote { border-color: #999; color: #555; background: #f9f9f9; }
    body { background: #fff !important; }
  }

  #file-input { display: none; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<div id="drop-overlay">
  <div class="drop-icon">📄</div>
  <p>Drop your .md file here</p>
</div>

<div class="progress-bar" id="progress-bar"></div>
<div class="focus-hint" id="focus-hint">Tap anywhere to show controls</div>

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <div class="home-logo">📖</div>
    <div class="home-title">Teq<span>Docs</span></div>
    <div class="home-sub">Read & write Markdown on mobile</div>
  </div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".md,.markdown,.txt">

<script>
/* ── State ── */
let currentMd='', currentFilename='', currentSavedId=null, editorMode='write';
let searchMatches=[], searchIndex=0;
let fontSizePx=parseInt(localStorage.getItem('teqdocs-font')||'17');
let isLight=localStorage.getItem('teqdocs-theme')==='light';
let activeTab='open', focusMode=false;

/* ── Init ── */
applyFont(); applyTheme(); renderSaved(); renderRecent();

/* ── Tabs ── */
function switchTab(tab) {
  activeTab=tab;
  document.querySelectorAll('.home-tab').forEach((t,i)=>t.classList.toggle('active',['open','files','recent'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='files') renderSaved();
  if(tab==='recent') renderRecent();
}

/* ── File open ── */
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0]; if(file) loadFile(file); e.target.value='';
});
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('drop-overlay').classList.add('active');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('drop-overlay').classList.remove('active');});
document.addEventListener('drop',e=>{
  e.preventDefault(); document.getElementById('drop-overlay').classList.remove('active');
  const file=e.dataTransfer.files[0];
  if(file&&file.name.match(/\.(md|markdown|txt)$/i)) loadFile(file);
});
function loadFile(file) {
  const r=new FileReader();
  r.onload=e=>{currentMd=e.target.result;currentFilename=file.name;currentSavedId=null;addRecent(file.name,currentMd);renderDoc();};
  r.readAsText(file);
}

/* ── Saved files ── */
function getSaved(){try{return JSON.parse(localStorage.getItem('teqdocs-saved')||'[]');}catch{return[];}}
function putSaved(arr){localStorage.setItem('teqdocs-saved',JSON.stringify(arr));}
function renderSaved() {
  const list=document.getElementById('saved-list'), files=getSaved();
  if(!files.length){list.innerHTML='<div class="empty-state"><div class="es-icon">📝</div>No saved files yet.<br>Tap New File to create one.</div>';return;}
  list.innerHTML='';
  files.forEach(f=>{
    const el=document.createElement('div'); el.className='file-item';
    const d=new Date(f.date), ds=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const words=f.content.trim().split(/\s+/).length;
    el.innerHTML=`<span class="fi-icon">📄</span><div class="fi-info"><div class="fi-name">${escapeHtml(f.name)}</div><div class="fi-meta">${ds} · ${words} words</div></div><div class="fi-actions"><button class="fi-action" onclick="event.stopPropagation();openEditorById('${f.id}')">✏️</button><button class="fi-action del" onclick="event.stopPropagation();deleteFile('${f.id}')">🗑️</button></div>`;
    el.onclick=()=>openSavedFile(f.id); list.appendChild(el);
  });
}
function openSavedFile(id) {
  const f=getSaved().find(x=>x.id===id); if(!f) return;
  currentMd=f.content;currentFilename=f.name;currentSavedId=id; renderDoc();
  document.getElementById('doc-edit-btn').style.display='block';
}
function deleteFile(id) {
  if(!confirm('Delete this file?')) return;
  putSaved(getSaved().filter(f=>f.id!==id)); renderSaved(); toast('File deleted');
}
function openEditorById(id) {
  const f=getSaved().find(x=>x.id===id); if(f) openEditor(f);
}

/* ── Editor ── */
function openEditor(file) {
  hideAll();
  document.getElementById('editor-screen').classList.add('visible');
  document.getElementById('editor-title').value=file?file.name:'';
  document.getElementById('md-editor').value=file?file.content:'';
  currentSavedId=file?file.id:null;
  setMode('write');
  document.getElementById('toolbar').style.display='none';
}
function editorBack() {
  document.getElementById('editor-screen').classList.remove('visible');
  document.getElementById('toolbar').style.display='flex';
  showHome(); renderSaved();
}
function setMode(mode) {
  editorMode=mode;
  const ta=document.getElementById('md-editor');
  const pv=document.getElementById('editor-preview');
  document.getElementById('pv-write').classList.toggle('active',mode==='write');
  document.getElementById('pv-preview').classList.toggle('active',mode==='preview');
  if(mode==='write'){ta.style.display='block';pv.classList.remove('visible');}
  else{ta.style.display='none';pv.classList.add('visible');document.getElementById('editor-preview-body').innerHTML=parseMd(ta.value);highlightCode('editor-preview-body');}
}
function saveFile() {
  const title=document.getElementById('editor-title').value.trim();
  if(!title){showModal('Name your file',title||'my-notes.md',name=>{document.getElementById('editor-title').value=name.endsWith('.md')?name:name+'.md';doSave();});return;}
  doSave();
}
function doSave() {
  const name=document.getElementById('editor-title').value.trim()||'Untitled.md';
  const content=document.getElementById('md-editor').value;
  let files=getSaved();
  if(currentSavedId){files=files.map(f=>f.id===currentSavedId?{...f,name,content,date:Date.now()}:f);}
  else{const id='f'+Date.now();currentSavedId=id;files.unshift({id,name,content,date:Date.now()});}
  putSaved(files); addRecent(name,content); toast('Saved ✓');
}
function downloadCurrent() {
  const name=document.getElementById('editor-title').value.trim()||'document.md';
  const content=document.getElementById('md-editor').value;
  triggerDownload(name.endsWith('.md')?name:name+'.md',content);
}
function openEditorFromReader() {
  openEditor(currentSavedId?getSaved().find(f=>f.id===currentSavedId):{id:null,name:currentFilename,content:currentMd});
}

/* ── Format helpers ── */
function fmt(prefix) {
  const ta=document.getElementById('md-editor'),s=ta.selectionStart;
  const before=ta.value.slice(0,s),lineStart=before.lastIndexOf('\n')+1;
  const line=before.slice(lineStart),insert=line.startsWith(prefix)?'':prefix;
  ta.value=ta.value.slice(0,lineStart)+insert+ta.value.slice(lineStart);
  ta.selectionStart=ta.selectionEnd=s+insert.length; ta.focus();
}
function fmtWrap(b,a) {
  const ta=document.getElementById('md-editor'),s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.slice(s,e)||'text';
  ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);
  ta.selectionStart=s+b.length;ta.selectionEnd=s+b.length+sel.length; ta.focus();
}
function fmtBlock(b,a) {
  const ta=document.getElementById('md-editor'),s=ta.selectionStart;
  const sel=ta.value.slice(s,ta.selectionEnd)||'code here';
  ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(ta.selectionEnd); ta.focus();
}
function insertHr() {
  const ta=document.getElementById('md-editor'),s=ta.selectionStart;
  ta.value=ta.value.slice(0,s)+'\n\n---\n\n'+ta.value.slice(s);
  ta.selectionStart=ta.selectionEnd=s+7; ta.focus();
}

/* ── Download ── */
function triggerDownload(filename,content,mime='text/markdown') {
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ── Syntax highlighting ── */
function highlightCode(containerId) {
  const container=document.getElementById(containerId)||document.getElementById('md-body');
  if(!container) return;
  container.querySelectorAll('pre code').forEach(block=>{
    if(typeof hljs!=='undefined') hljs.highlightElement(block);
  });
}

/* ── Markdown parser ── */
function parseMd(md) {
  let html=md;
  html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html=html.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="language-${lang||'plaintext'}">${code.trimEnd()}</code></pre>`);
  html=html.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  for(let i=6;i>=1;i--) html=html.replace(new RegExp(`^#{${i}}\\s+(.+)$`,'gm'),`<h${i}>$1</h${i}>`);
  html=html.replace(/^(---|\*\*\*|___)\s*$/gm,'<hr>');
  html=html.replace(/^&gt;\s+(.+)$/gm,'<blockquote>$1</blockquote>');
  html=html.replace(/<\/blockquote>\n<blockquote>/g,'\n');
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/__(.+?)__/g,'<strong>$1</strong>');
  html=html.replace(/\*([^\s*][^*]*?)\*/g,'<em>$1</em>');
  html=html.replace(/_([^\s_][^_]*?)_/g,'<em>$1</em>');
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
  html=html.replace(/^- \[x\]\s+(.+)$/gim,'<li><input type="checkbox" checked disabled> $1</li>');
  html=html.replace(/^- \[ \]\s+(.+)$/gim,'<li><input type="checkbox" disabled> $1</li>');
  html=html.replace(/^[-*+]\s+(.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`);
  html=html.replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>');
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  html=html.replace(/\|(.+)\|\n\|[-:| ]+\|\n((?:\|.+\|\n?)*)/g,(_,header,body)=>{
    const ths=header.split('|').filter(s=>s.trim()).map(h=>`<th>${h.trim()}</th>`).join('');
    const rows=body.trim().split('\n').map(row=>{const tds=row.split('|').filter(s=>s.trim()).map(d=>`<td>${d.trim()}</td>`).join('');return `<tr>${tds}</tr>`;}).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  const blockTags=/^(<h[1-6]|<ul|<ol|<li|<pre|<blockquote|<hr|<table|<img)/;
  html=html.split('\n').map(line=>(blockTags.test(line.trim())||line.trim()==='')?line:`<p>${line}</p>`).join('\n');
  html=html.replace(/<p><\/p>/g,'').replace(/<p>\s*<\/p>/g,'');
  return html;
}

/* ── Read time & word count ── */
function calcReadTime(text) {
  const words=text.trim().split(/\s+/).filter(Boolean).length;
  const mins=Math.max(1,Math.round(words/200));
  return {words, mins};
}

/* ── Reader ── */
function renderDoc() {
  hideAll();
  const body=document.getElementById('md-body');
  body.innerHTML=parseMd(currentMd);
  body.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach((h,i)=>h.id='heading-'+i);
  highlightCode('md-body');
  document.getElementById('doc-filename').textContent=currentFilename;

  // Read time + word count
  const {words,mins}=calcReadTime(currentMd);
  document.getElementById('doc-readtime').textContent=`${mins} min read`;
  document.getElementById('doc-wordcount').textContent=`${words.toLocaleString()} words`;

  document.getElementById('reader').classList.add('visible');
  document.getElementById('toolbar').style.display='flex';
  buildToc(); window.scrollTo(0,0); closeSearch();
}

/* ── Screen helpers ── */
function hideAll() {
  document.getElementById('home').style.display='none';
  document.getElementById('reader').classList.remove('visible');
  document.getElementById('editor-screen').classList.remove('visible');
  document.getElementById('doc-edit-btn').style.display='none';
  if(focusMode) toggleFocusMode();
}
function showHome() {
  document.getElementById('home').style.display='flex';
  document.getElementById('reader').classList.remove('visible');
  document.getElementById('editor-screen').classList.remove('visible');
  document.getElementById('toolbar').style.display='flex';
}
function goHome() {
  currentMd='';currentFilename='';currentSavedId=null;
  showHome();closeToc();closeSearch();closeFontPopup();closeExportMenu();
  if(focusMode) toggleFocusMode();
  window.scrollTo(0,0);
}

/* ── Focus mode ── */
function toggleFocusMode() {
  focusMode=!focusMode;
  document.body.classList.toggle('focus-mode',focusMode);
  document.getElementById('doc-focus-btn').classList.toggle('active',focusMode);
  if(focusMode) {
    const hint=document.getElementById('focus-hint');
    hint.classList.add('show');
    setTimeout(()=>hint.classList.remove('show'),2500);
  }
}
// Tap in focus mode to peek controls
document.getElementById('reader') && document.addEventListener('click',e=>{
  if(!focusMode) return;
  if(e.target.closest('#toolbar')||e.target.closest('.doc-header')) return;
  document.body.classList.toggle('focus-peek');
  setTimeout(()=>document.body.classList.remove('focus-peek'),2000);
});

/* ── Export functions ── */
function toggleExportMenu() {
  const m=document.getElementById('export-menu');
  m.classList.toggle('open');
}
function closeExportMenu() { document.getElementById('export-menu').classList.remove('open'); }

function exportHTML() {
  closeExportMenu();
  const title=currentFilename.replace(/\.md$/i,'')||'document';
  const isLightMode=document.body.classList.contains('light');
  const bg=isLightMode?'#faf8f3':'#0f1117';
  const textColor=isLightMode?'#1a1a1a':'#e8e6df';
  const accent=isLightMode?'#b06e1e':'#e8a44a';
  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(title)}</title>
<style>
  body { background: ${bg}; color: ${textColor}; font-family: Georgia, serif; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; line-height: 1.75; }
  h1,h2,h3,h4,h5,h6 { font-family: -apple-system, sans-serif; color: ${accent}; }
  h2 { border-bottom: 1px solid #333; padding-bottom: 0.4rem; }
  a { color: #6db3f2; }
  code { background: #1a1a2e; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; color: #e06c75; }
  pre { background: #1a1a2e; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  pre code { background: none; padding: 0; color: ${textColor}; }
  blockquote { border-left: 3px solid ${accent}; padding: 0.5rem 1rem; margin: 1rem 0; opacity: 0.8; font-style: italic; }
  table { border-collapse: collapse; width: 100%; }
  th,td { padding: 8px 12px; border-bottom: 1px solid #333; text-align: left; }
  img { max-width: 100%; }
</style>
</head>
<body>
${document.getElementById('md-body').innerHTML}
</body>
</html>`;
  triggerDownload(title+'.html', html, 'text/html');
  toast('Exported as HTML ✓');
}

function exportText() {
  closeExportMenu();
  // Strip markdown syntax for plain text
  let text=currentMd;
  text=text.replace(/^#{1,6}\s+/gm,'');
  text=text.replace(/\*\*(.+?)\*\*/g,'$1');
  text=text.replace(/__(.+?)__/g,'$1');
  text=text.replace(/\*(.+?)\*/g,'$1');
  text=text.replace(/_(.+?)_/g,'$1');
  text=text.replace(/~~(.+?)~~/g,'$1');
  text=text.replace(/`{1,3}[^`]*`{1,3}/g,'');
  text=text.replace(/\[([^\]]+)\]\([^)]+\)/g,'$1');
  text=text.replace(/!\[([^\]]*)\]\([^)]+\)/g,'[$1]');
  text=text.replace(/^[-*+]\s+/gm,'• ');
  text=text.replace(/^\d+\.\s+/gm,'');
  text=text.replace(/^>\s+/gm,'');
  text=text.replace(/^[-*_]{3,}\s*$/gm,'─────────────────────');
  const fname=(currentFilename.replace(/\.md$/i,'')||'document')+'.txt';
  triggerDownload(fname,text,'text/plain');
  toast('Exported as text ✓');
}

function exportPDF() {
  closeExportMenu();
  toast('Opening print dialog…');
  setTimeout(()=>window.print(), 300);
}

/* ── TOC ── */
function buildToc() {
  const list=document.getElementById('toc-list');
  const headings=document.querySelectorAll('#md-body h1,#md-body h2,#md-body h3');
  list.innerHTML='';
  if(!headings.length){list.innerHTML='<p class="toc-empty">No headings found</p>';return;}
  headings.forEach(h=>{
    const level=parseInt(h.tagName[1]);
    const item=document.createElement('div'); item.className='toc-item'; item.dataset.level=level;
    item.textContent=h.textContent;
    item.onclick=()=>{h.scrollIntoView({behavior:'smooth',block:'start'});closeToc();};
    list.appendChild(item);
  });
}
function toggleToc(){const p=document.getElementById('toc-panel');p.classList.contains('open')?closeToc():(p.classList.add('open'),closeSearch(),closeFontPopup(),closeExportMenu());}
function closeToc(){document.getElementById('toc-panel').classList.remove('open');}

/* ── Search ── */
function toggleSearch(){
  const p=document.getElementById('search-panel');
  p.classList.contains('open')?closeSearch():(p.classList.add('open'),closeToc(),closeFontPopup(),closeExportMenu(),setTimeout(()=>document.getElementById('search-input').focus(),100));
}
function closeSearch(){
  document.getElementById('search-panel').classList.remove('open');
  clearHighlights();
  document.getElementById('search-input').value='';
  document.getElementById('search-count').textContent='';
}
document.getElementById('search-input').addEventListener('input',e=>doSearch(e.target.value.trim()));
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')nextMatch();});

function doSearch(term) {
  clearHighlights(); searchMatches=[]; searchIndex=0;
  const countEl=document.getElementById('search-count');
  if(!term||term.length<1){countEl.textContent='';return;}
  const body=document.getElementById('md-body');
  if(!body){countEl.textContent='No results';return;}
  const nodes=[];
  const walker=document.createTreeWalker(body,NodeFilter.SHOW_TEXT,null,false);
  while(walker.nextNode()) nodes.push(walker.currentNode);
  const re=new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  nodes.forEach(node=>{
    if(!node.parentNode) return;
    const text=node.textContent; re.lastIndex=0;
    if(!re.test(text)) return; re.lastIndex=0;
    const frag=document.createDocumentFragment(); let last=0,m;
    while((m=re.exec(text))!==null){
      if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
      const mark=document.createElement('mark'); mark.textContent=m[0]; frag.appendChild(mark);
      searchMatches.push(mark); last=m.index+m[0].length;
    }
    if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
  if(searchMatches.length){searchMatches[0].classList.add('current');searchMatches[0].scrollIntoView({block:'center',behavior:'smooth'});countEl.textContent=`1 / ${searchMatches.length}`;}
  else countEl.textContent='No results';
}
function nextMatch(){
  if(!searchMatches.length) return;
  searchMatches[searchIndex].classList.remove('current');
  searchIndex=(searchIndex+1)%searchMatches.length;
  searchMatches[searchIndex].classList.add('current');
  searchMatches[searchIndex].scrollIntoView({block:'center',behavior:'smooth'});
  document.getElementById('search-count').textContent=`${searchIndex+1} / ${searchMatches.length}`;
}
function clearHighlights(){
  document.querySelectorAll('#md-body mark').forEach(m=>{if(!m.parentNode)return;m.parentNode.replaceChild(document.createTextNode(m.textContent),m);});
  searchMatches=[]; searchIndex=0;
}

/* ── Font size ── */
function toggleFontPopup(){const p=document.getElementById('font-popup');p.classList.contains('open')?closeFontPopup():(p.classList.add('open'),closeToc(),closeExportMenu());}
function closeFontPopup(){document.getElementById('font-popup').classList.remove('open');}
function changeFontSize(d){fontSizePx=Math.min(24,Math.max(13,fontSizePx+d));applyFont();localStorage.setItem('teqdocs-font',fontSizePx);}
function applyFont(){document.documentElement.style.setProperty('--font-size',fontSizePx+'px');document.getElementById('font-size-display').textContent=fontSizePx+'px';}

/* ── Theme ── */
function toggleTheme(){isLight=!isLight;applyTheme();localStorage.setItem('teqdocs-theme',isLight?'light':'dark');}
function applyTheme(){document.body.classList.toggle('light',isLight);document.getElementById('theme-icon').textContent=isLight?'🌙':'☀️';document.querySelector('meta[name="theme-color"]').content=isLight?'#faf8f3':'#0f1117';}

/* ── Progress bar ── */
window.addEventListener('scroll',()=>{const el=document.documentElement;document.getElementById('progress-bar').style.width=(el.scrollTop/(el.scrollHeight-el.clientHeight)*100)+'%';});

/* ── Recent ── */
function addRecent(name,content){
  try{let r=JSON.parse(localStorage.getItem('teqdocs-recent')||'[]');r=r.filter(x=>x.name!==name);r.unshift({name,content,date:Date.now()});r=r.slice(0,8);localStorage.setItem('teqdocs-recent',JSON.stringify(r));}catch(e){}
}
function renderRecent(){
  const list=document.getElementById('recent-list');
  try{
    const r=JSON.parse(localStorage.getItem('teqdocs-recent')||'[]');
    if(!r.length){list.innerHTML='<div class="empty-state"><div class="es-icon">🕐</div>No recent files yet.</div>';return;}
    list.innerHTML='';
    r.forEach(f=>{
      const el=document.createElement('div');el.className='file-item';
      const d=Math.floor((Date.now()-f.date)/86400000);
      const ds=d===0?'Today':d===1?'Yesterday':d+'d ago';
      el.innerHTML=`<span class="fi-icon">📄</span><div class="fi-info"><div class="fi-name">${escapeHtml(f.name)}</div><div class="fi-meta">${ds}</div></div>`;
      el.onclick=()=>{currentMd=f.content;currentFilename=f.name;currentSavedId=null;renderDoc();};
      list.appendChild(el);
    });
  }catch(e){list.innerHTML='';}
}

/* ── Modal ── */
let modalCallback=null;
function showModal(title,defaultVal,cb){
  modalCallback=cb;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-input').value=defaultVal||'';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
  document.getElementById('modal-confirm').onclick=()=>{
    const val=document.getElementById('modal-input').value.trim();
    if(!val)return; closeModal(); if(modalCallback)modalCallback(val);
  };
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-confirm').click();});

/* ── Toast ── */
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}

/* ── Click outside ── */
document.addEventListener('click',e=>{
  const fp=document.getElementById('font-popup');
  if(fp.classList.contains('open')&&!fp.contains(e.target)&&!document.getElementById('font-btn').contains(e.target))closeFontPopup();
  const em=document.getElementById('export-menu');
  if(em.classList.contains('open')&&!em.contains(e.target)&&!document.getElementById('doc-export-btn').contains(e.target))closeExportMenu();
});

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Electron integration ── */
let currentFilePath=null;
if(window.electronAPI){
  document.querySelectorAll('.drop-hint').forEach(el=>el.style.display='none');
  window.electronAPI.onFileOpened(({filename,content,filePath})=>{
    currentMd=content;currentFilename=filename;currentSavedId=null;currentFilePath=filePath;
    addRecent(filename,content);renderDoc();document.getElementById('doc-edit-btn').style.display='block';
  });
  window.electronAPI.onNewFile(()=>openEditor(null));
  window.electronAPI.onSaveRequest(async()=>{
    const isEd=document.getElementById('editor-screen').classList.contains('visible');
    const content=isEd?document.getElementById('md-editor').value:currentMd;
    const name=isEd?(document.getElementById('editor-title').value.trim()||'Untitled.md'):currentFilename;
    const result=await window.electronAPI.showSaveDialog(name,content);
    if(result.success)toast('Saved to disk ✓');
  });
  window.electronAPI.onSaveAsRequest(async()=>{
    const isEd=document.getElementById('editor-screen').classList.contains('visible');
    const content=isEd?document.getElementById('md-editor').value:currentMd;
    const name=isEd?(document.getElementById('editor-title').value.trim()||'Untitled.md'):currentFilename;
    const result=await window.electronAPI.showSaveDialog(name,content);
    if(result.success)toast('Saved ✓');
  });
  window.triggerDownload=async function(filename,content){
    const result=await window.electronAPI.showSaveDialog(filename,content);
    if(result.success)toast('Saved to disk ✓');
  };
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
</script>
