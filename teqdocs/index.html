<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TeqDocs">
<title>TeqDocs</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
:root {
  --parchment: #f5f0e8;
  --parchment2: #ede8df;
  --parchment3: #e0d9cc;
  --ink: #1c1a16;
  --ink2: #3d3a33;
  --ink3: #6b6760;
  --accent: #8b4513;
  --accent2: #a0522d;
  --accent-light: rgba(139,69,19,0.12);
  --gold: #c49a3c;
  --sidebar-w: 260px;
  --header-h: 52px;
  --radius: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.10);
  --page-shadow: 2px 0 12px rgba(0,0,0,0.08);
  --font-serif: 'Georgia','Times New Roman',serif;
  --font-ui: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono: 'Fira Code','Consolas',monospace;
  --font-size: 18px;
  --line-height: 1.85;
  --max-width: 680px;
}
.dark {
  --parchment: #1a1814;
  --parchment2: #221f1a;
  --parchment3: #2d2a24;
  --ink: #e8e4da;
  --ink2: #c8c4ba;
  --ink3: #8a867e;
  --accent: #d4894a;
  --accent2: #c47a3a;
  --accent-light: rgba(212,137,74,0.12);
  --gold: #d4a84b;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
  --page-shadow: 2px 0 12px rgba(0,0,0,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: var(--font-size); scroll-behavior: smooth; }
body { background: var(--parchment); color: var(--ink); font-family: var(--font-ui); min-height: 100dvh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }

/* ── APP SHELL ── */
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* ── HEADER ── */
#header {
  height: var(--header-h); flex-shrink: 0;
  background: var(--parchment2);
  border-bottom: 1px solid var(--parchment3);
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  box-shadow: var(--shadow);
  z-index: 50; position: relative;
}
.hdr-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
.hdr-logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.hdr-logo-text { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
.hdr-logo-text span { color: var(--accent); }
.hdr-spacer { flex: 1; }
.hdr-doc-title { font-family: var(--font-serif); font-size: 0.9rem; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; text-align: center; }
.hdr-btn { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 1.1rem; padding: 6px 8px; border-radius: 7px; transition: background 0.15s, color 0.15s; font-family: var(--font-ui); display: flex; align-items: center; gap: 4px; font-size: 0.82rem; font-weight: 600; }
.hdr-btn:hover { background: var(--parchment3); color: var(--ink); }
.hdr-btn.active { color: var(--accent); }

/* ── BODY (sidebar + content) ── */
#body { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--parchment2);
  border-right: 1px solid var(--parchment3);
  display: flex; flex-direction: column;
  box-shadow: var(--page-shadow);
  z-index: 40;
  transition: transform 0.3s, width 0.3s;
  overflow: hidden;
}
#sidebar.collapsed { width: 0; }
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--parchment3); flex-shrink: 0; }
.sb-tab { flex: 1; padding: 10px 6px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; font-family: var(--font-ui); }
.sb-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sb-panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
.sb-panel.active { display: flex; }
.sb-section { padding: 12px; }
.sb-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; padding-left: 2px; }
.sb-new-btn { width: 100%; background: none; border: 1px dashed var(--accent); border-radius: 8px; padding: 9px; font-size: 0.8rem; font-weight: 700; color: var(--accent); font-family: var(--font-ui); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; transition: background 0.15s; }
.sb-new-btn:hover { background: var(--accent-light); }
.sb-open-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 0.82rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 8px; transition: opacity 0.15s; }
.sb-open-btn:hover { opacity: 0.9; }
.file-card { background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 8px; padding: 9px 11px; cursor: pointer; margin-bottom: 6px; transition: border-color 0.15s, box-shadow 0.15s; }
.file-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(139,69,19,0.1); }
.file-card.active { border-color: var(--accent); background: var(--accent-light); }
.fc-name { font-size: 0.82rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fc-meta { font-size: 0.68rem; color: var(--ink3); margin-top: 2px; display: flex; align-items: center; justify-content: space-between; }
.fc-type { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 5px; border-radius: 4px; }
.fc-type.md { background: rgba(139,69,19,0.12); color: var(--accent); }
.fc-type.pdf { background: rgba(196,49,49,0.12); color: #c43131; }
.fc-actions { display: flex; gap: 2px; margin-top: 5px; }
.fc-action { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 0.75rem; padding: 3px 6px; border-radius: 5px; font-family: var(--font-ui); transition: color 0.15s, background 0.15s; }
.fc-action:hover { background: var(--parchment3); color: var(--ink); }
.fc-action.del:hover { color: #c43131; }

/* TOC in sidebar */
.toc-item { padding: 6px 10px; font-size: 0.82rem; cursor: pointer; color: var(--ink2); border-radius: 6px; transition: background 0.12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toc-item:hover { background: var(--parchment3); }
.toc-item.active { color: var(--accent); background: var(--accent-light); }
.toc-item[data-level="1"] { font-weight: 700; font-family: var(--font-serif); }
.toc-item[data-level="2"] { padding-left: 20px; font-size: 0.78rem; }
.toc-item[data-level="3"] { padding-left: 32px; font-size: 0.72rem; color: var(--ink3); }
.toc-empty { font-size: 0.8rem; color: var(--ink3); text-align: center; padding: 1.5rem 1rem; }

/* ── CONTENT AREA ── */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }

/* ── WELCOME ── */
#welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100%; padding: 3rem 2rem;
  text-align: center; gap: 1.5rem;
}
.welcome-book { font-size: 4rem; line-height: 1; }
.welcome-title { font-family: var(--font-serif); font-size: 2rem; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; }
.welcome-title span { color: var(--accent); }
.welcome-sub { color: var(--ink3); font-size: 0.95rem; max-width: 340px; line-height: 1.6; font-family: var(--font-serif); font-style: italic; }
.welcome-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.wa-btn { padding: 11px 22px; border-radius: var(--radius); font-size: 0.9rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; transition: all 0.15s; border: none; }
.wa-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(139,69,19,0.3); }
.wa-btn.primary:hover { opacity: 0.9; }
.wa-btn.secondary { background: var(--parchment2); color: var(--ink); border: 1px solid var(--parchment3); }
.wa-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
.welcome-formats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.wf-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; border: 1px solid var(--parchment3); color: var(--ink3); font-family: var(--font-ui); }

/* ── READER ── */
#reader { display: none; padding-bottom: 4rem; }
#reader.visible { display: block; }

/* Doc info bar */
.doc-info-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 2rem; border-bottom: 1px solid var(--parchment3);
  background: var(--parchment2); flex-wrap: wrap;
  position: sticky; top: 0; z-index: 30;
}
.dib-title { font-family: var(--font-serif); font-size: 0.9rem; font-weight: 700; color: var(--ink2); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dib-meta { font-size: 0.72rem; color: var(--ink3); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.dib-readtime { background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 20px; padding: 2px 9px; font-size: 0.68rem; font-weight: 600; }
.dib-actions { display: flex; gap: 6px; flex-shrink: 0; }
.dib-btn { background: none; border: 1px solid var(--parchment3); border-radius: 7px; padding: 4px 10px; font-size: 0.72rem; color: var(--ink3); cursor: pointer; font-family: var(--font-ui); font-weight: 600; white-space: nowrap; transition: all 0.15s; }
.dib-btn:hover { border-color: var(--accent); color: var(--accent); }
.dib-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Export menu */
.export-menu { position: absolute; top: 100%; right: 16px; background: var(--parchment2); border: 1px solid var(--parchment3); border-radius: var(--radius); padding: 6px; z-index: 200; display: none; flex-direction: column; gap: 2px; box-shadow: var(--shadow); min-width: 180px; }
.export-menu.open { display: flex; }
.export-item { background: none; border: none; cursor: pointer; color: var(--ink); font-size: 0.85rem; font-family: var(--font-ui); padding: 9px 12px; border-radius: 7px; text-align: left; display: flex; align-items: center; gap: 8px; transition: background 0.12s; }
.export-item:hover { background: var(--parchment3); }

/* Markdown body */
.md-body { max-width: var(--max-width); margin: 0 auto; padding: 2.5rem 2rem; font-family: var(--font-serif); font-size: 1rem; line-height: var(--line-height); color: var(--ink); }
.md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6 { font-family: var(--font-serif); font-weight: 700; color: var(--ink); line-height: 1.3; margin-top: 2.5rem; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
.md-body h1 { font-size: 2rem; margin-top: 0.5rem; border-bottom: 2px solid var(--parchment3); padding-bottom: 0.6rem; color: var(--accent); }
.md-body h2 { font-size: 1.4rem; border-bottom: 1px solid var(--parchment3); padding-bottom: 0.4rem; }
.md-body h3 { font-size: 1.15rem; color: var(--accent2); }
.md-body h4,.md-body h5,.md-body h6 { font-size: 1rem; color: var(--ink3); }
.md-body p { margin-bottom: 1.1rem; text-align: justify; hyphens: auto; }
.md-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.md-body strong { font-weight: 700; }
.md-body em { font-style: italic; }
.md-body ul,.md-body ol { padding-left: 1.5rem; margin-bottom: 1rem; }
.md-body li { margin-bottom: 0.4rem; }
.md-body blockquote { border-left: 3px solid var(--gold); padding: 0.6rem 1.2rem; margin: 1.5rem 0; background: var(--parchment2); border-radius: 0 var(--radius) var(--radius) 0; color: var(--ink2); font-style: italic; font-size: 1.05em; }
.md-body code { font-family: var(--font-mono); font-size: 0.82em; background: var(--parchment3); border: 1px solid var(--parchment3); border-radius: 4px; padding: 0.15em 0.4em; color: var(--accent); }
.md-body pre { margin: 1.5rem 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--parchment3); box-shadow: var(--shadow); }
.md-body pre code { font-size: 0.83rem; line-height: 1.6; border-radius: 0; border: none; padding: 1rem 1.2rem; display: block; overflow-x: auto; background: #1e1e2e !important; color: #cdd6f4; }
.md-body pre .hljs { background: #1e1e2e !important; padding: 1rem 1.2rem; }
.md-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; display: block; overflow-x: auto; font-family: var(--font-ui); }
.md-body th { background: var(--parchment2); color: var(--accent); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--accent); }
.md-body td { padding: 9px 14px; border-bottom: 1px solid var(--parchment3); vertical-align: top; }
.md-body tr:last-child td { border-bottom: none; }
.md-body hr { border: none; border-top: 1px solid var(--parchment3); margin: 2.5rem 0; }
.md-body img { max-width: 100%; border-radius: var(--radius); margin: 1.5rem 0; height: auto; box-shadow: var(--shadow); }
.md-body input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; margin-right: 6px; cursor: default; vertical-align: middle; position: relative; top: -1px; }

/* Highlights */
.td-highlight { background: rgba(196,154,60,0.35); border-radius: 2px; padding: 0 1px; cursor: pointer; }
.td-highlight.active { background: rgba(196,154,60,0.6); }

/* Focus mode */
body.focus-mode #sidebar { width: 0; }
body.focus-mode .doc-info-bar { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
body.focus-mode:hover .doc-info-bar { opacity: 1; pointer-events: all; }

/* ── PDF VIEWER ── */
#pdf-viewer { display: none; }
#pdf-viewer.visible { display: block; }
.pdf-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 2rem; border-bottom: 1px solid var(--parchment3); background: var(--parchment2); position: sticky; top: 0; z-index: 30; flex-wrap: wrap; }
.pdf-tb-btn { background: none; border: 1px solid var(--parchment3); border-radius: 7px; padding: 5px 11px; font-size: 0.78rem; color: var(--ink2); cursor: pointer; font-family: var(--font-ui); font-weight: 600; transition: all 0.15s; white-space: nowrap; }
.pdf-tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.pdf-tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pdf-page-nav { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--ink3); font-family: var(--font-ui); }
.pdf-page-input { width: 48px; background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 6px; color: var(--ink); font-size: 0.82rem; padding: 4px 6px; text-align: center; font-family: var(--font-ui); outline: none; }
.pdf-page-input:focus { border-color: var(--accent); }
.pdf-spacer { flex: 1; }
.pdf-canvas-wrap { padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.pdf-page-container { position: relative; box-shadow: 0 4px 24px rgba(0,0,0,0.15); border-radius: 4px; overflow: hidden; background: white; }
.pdf-canvas { display: block; }
.pdf-text-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; }
.pdf-text-layer span { position: absolute; white-space: pre; cursor: text; }
.pdf-anno-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
.pdf-highlight-rect { position: absolute; background: rgba(196,154,60,0.35); border-radius: 2px; pointer-events: none; }
.pdf-page-label { font-size: 0.72rem; color: var(--ink3); font-family: var(--font-ui); }

/* Annotation panel */
#anno-panel { width: 240px; flex-shrink: 0; background: var(--parchment2); border-left: 1px solid var(--parchment3); display: none; flex-direction: column; }
#anno-panel.open { display: flex; }
.anno-header { padding: 12px 14px; border-bottom: 1px solid var(--parchment3); font-size: 0.82rem; font-weight: 700; color: var(--ink); display: flex; align-items: center; justify-content: space-between; }
.anno-close { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 1rem; }
.anno-list { overflow-y: auto; flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.anno-item { background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: border-color 0.15s; }
.anno-item:hover { border-color: var(--accent); }
.anno-text { font-size: 0.78rem; color: var(--ink2); font-family: var(--font-serif); font-style: italic; line-height: 1.4; }
.anno-page { font-size: 0.65rem; color: var(--ink3); margin-top: 4px; font-family: var(--font-ui); }
.anno-empty { font-size: 0.8rem; color: var(--ink3); text-align: center; padding: 2rem 1rem; font-style: italic; }

/* ── EDITOR ── */
#editor-screen { display: none; flex-direction: column; height: 100%; }
#editor-screen.visible { display: flex; }
.editor-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--parchment2); border-bottom: 1px solid var(--parchment3); flex-shrink: 0; }
.editor-back { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1.1rem; padding: 4px; line-height: 1; flex-shrink: 0; font-family: var(--font-ui); }
.editor-title-input { flex: 1; background: transparent; border: none; color: var(--ink); font-size: 0.9rem; font-weight: 700; font-family: var(--font-serif); outline: none; min-width: 0; }
.editor-title-input::placeholder { color: var(--ink3); }
.editor-save-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; flex-shrink: 0; }
.editor-dl-btn { background: none; border: 1px solid var(--parchment3); border-radius: 8px; padding: 6px 10px; font-size: 0.82rem; color: var(--ink3); font-family: var(--font-ui); cursor: pointer; flex-shrink: 0; }
.fmt-bar { display: flex; gap: 2px; padding: 6px 10px; background: var(--parchment2); border-bottom: 1px solid var(--parchment3); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.fmt-bar::-webkit-scrollbar { display: none; }
.fmt-btn { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 0.8rem; font-weight: 700; font-family: var(--font-ui); padding: 5px 8px; border-radius: 6px; white-space: nowrap; line-height: 1; transition: background 0.12s, color 0.12s; }
.fmt-btn:hover { background: var(--parchment3); color: var(--ink); }
.preview-toggle { display: flex; border-top: 1px solid var(--parchment3); flex-shrink: 0; }
.pv-btn { flex: 1; background: none; border: none; padding: 8px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink3); cursor: pointer; font-family: var(--font-ui); transition: color 0.15s, background 0.15s; }
.pv-btn.active { color: var(--accent); background: var(--parchment2); }
#md-editor { flex: 1; background: var(--parchment); color: var(--ink); border: none; outline: none; padding: 1.5rem; font-family: var(--font-mono); font-size: 0.88rem; line-height: 1.75; resize: none; width: 100%; }
#md-editor::placeholder { color: var(--ink3); }
#editor-preview { display: none; flex: 1; overflow-y: auto; }
#editor-preview.visible { display: block; }

/* ── SEARCH ── */
#search-bar { position: fixed; top: var(--header-h); left: 0; right: 0; background: var(--parchment2); border-bottom: 1px solid var(--parchment3); padding: 10px 16px; z-index: 100; display: none; align-items: center; gap: 10px; box-shadow: var(--shadow); }
#search-bar.open { display: flex; }
#search-input { flex: 1; background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 8px; color: var(--ink); font-size: 0.95rem; font-family: var(--font-ui); padding: 8px 12px; outline: none; }
#search-input:focus { border-color: var(--accent); }
.search-count { font-size: 0.78rem; color: var(--ink3); white-space: nowrap; }
.search-close { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 1rem; }
mark { background: rgba(196,154,60,0.35); color: var(--ink); border-radius: 2px; padding: 0 2px; }
mark.current { background: var(--gold); color: #000; }

/* ── MODAL ── */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
#modal-overlay.open { display: flex; }
.modal-box { background: var(--parchment2); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem; width: 100%; max-width: 480px; border: 1px solid var(--parchment3); }
.modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 1rem; font-family: var(--font-serif); color: var(--ink); }
.modal-input { width: 100%; background: var(--parchment); border: 1px solid var(--parchment3); border-radius: 8px; color: var(--ink); font-size: 1rem; font-family: var(--font-ui); padding: 10px 12px; outline: none; margin-bottom: 1rem; }
.modal-input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 11px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; font-family: var(--font-ui); cursor: pointer; border: none; }
.modal-btn.primary { background: var(--accent); color: #fff; }
.modal-btn.secondary { background: var(--parchment3); color: var(--ink); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); border-radius: 20px; padding: 9px 20px; font-size: 0.82rem; font-weight: 600; color: var(--parchment); z-index: 600; opacity: 0; transition: opacity 0.2s; white-space: nowrap; pointer-events: none; box-shadow: var(--shadow); }
#toast.show { opacity: 1; }

/* ── DROP OVERLAY ── */
#drop-overlay { position: fixed; inset: 0; z-index: 700; background: rgba(245,240,232,0.92); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; backdrop-filter: blur(8px); }
.dark #drop-overlay { background: rgba(26,24,20,0.92); }
#drop-overlay.active { display: flex; }
#drop-overlay .drop-icon { font-size: 4rem; }
#drop-overlay p { color: var(--accent); font-size: 1.3rem; font-weight: 700; font-family: var(--font-serif); }

/* ── PROGRESS BAR ── */
.progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; z-index: 200; transition: width 0.1s linear; pointer-events: none; }

/* ── PRINT/PDF ── */
@media print {
  #header, #sidebar, #search-bar, #modal-overlay, #toast, #drop-overlay, .progress-bar, .doc-info-bar, .pdf-toolbar { display: none !important; }
  #reader { display: block !important; padding: 0 !important; }
  .md-body { max-width: 100%; padding: 0; font-size: 12pt; }
  body { background: #fff !important; color: #000 !important; }
}

/* Mobile */
@media (max-width: 640px) {
  #sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; z-index: 40; transform: translateX(0); }
  #sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-w); }
  --sidebar-w: 280px;
}

#file-input { display: none; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--parchment3); border-radius: 4px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<div id="drop-overlay">
  <div class="drop-icon">📚</div>
  <p>Drop a file to open it</p>
</div>
<div class="progress-bar" id="progress-bar"></div>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="hdr-logo">
      <div class="hdr-logo-icon">📖</div>
      <div class="hdr-logo-text">Teq<span>Docs</span></div>
    </div>
    <button class="hdr-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <div class="hdr-spacer"></div>
    <span class="hdr-doc-title" id="hdr-doc-title">Your reading library</span>
    <div class="hdr-spacer"></div>
    <button class="hdr-btn" onclick="toggleSearch()" title="Search">🔍 Search</button>
    <button class="hdr-btn" id="focus-btn" onclick="toggleFocusMode()" title="Focus mode">⊙</button>
    <button class="hdr-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
  </div>

  <!-- BODY -->
  <div id="body">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-tabs">
        <button class="sb-tab active" onclick="switchSbTab('library')">Library</button>
        <button class="sb-tab" onclick="switchSbTab('contents')">Contents</button>
        <button class="sb-tab" onclick="switchSbTab('notes')">Notes</button>
      </div>

      <!-- Library panel -->
      <div class="sb-panel active" id="sb-library">
        <div class="sb-section">
          <button class="sb-open-btn" onclick="document.getElementById('file-input').click()">📂 Open File</button>
          <button class="sb-new-btn" onclick="openEditor(null)">✏️ New MD File</button>
          <div class="sb-label">Recent</div>
          <div id="recent-list"></div>
          <div class="sb-label" style="margin-top:12px">Saved Files</div>
          <div id="saved-list"></div>
        </div>
      </div>

      <!-- Contents / TOC panel -->
      <div class="sb-panel" id="sb-contents">
        <div class="sb-section">
          <div class="sb-label">Table of Contents</div>
          <div id="toc-list"></div>
        </div>
      </div>

      <!-- Notes / Highlights panel -->
      <div class="sb-panel" id="sb-notes">
        <div class="sb-section">
          <div class="sb-label">Highlights & Notes</div>
          <div id="highlights-list"></div>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">

      <!-- Welcome -->
      <div id="welcome">
        <div class="welcome-book">📚</div>
        <div class="welcome-title">Teq<span>Docs</span></div>
        <p class="welcome-sub">Your beautiful reading & writing companion. Open Markdown or PDF files to get started.</p>
        <div class="welcome-actions">
          <button class="wa-btn primary" onclick="document.getElementById('file-input').click()">📂 Open File</button>
          <button class="wa-btn secondary" onclick="openEditor(null)">✏️ New Document</button>
        </div>
        <div class="welcome-formats">
          <span class="wf-badge">📝 Markdown</span>
          <span class="wf-badge">📄 PDF</span>
          <span class="wf-badge">📋 Plain Text</span>
        </div>
      </div>

      <!-- MD Reader -->
      <div id="reader">
        <div class="doc-info-bar" id="doc-info-bar">
          <span class="dib-title" id="doc-filename">—</span>
          <div class="dib-meta">
            <span class="dib-readtime" id="doc-readtime"></span>
            <span id="doc-wordcount" style="font-size:0.68rem;color:var(--ink3)"></span>
          </div>
          <div class="dib-actions">
            <button class="dib-btn" id="doc-edit-btn" onclick="openEditorFromReader()" style="display:none">✏️ Edit</button>
            <button class="dib-btn" id="doc-export-btn" onclick="toggleExportMenu()">Export ▾</button>
          </div>
          <div class="export-menu" id="export-menu">
            <button class="export-item" onclick="exportHTML()">🌐 Export as HTML</button>
            <button class="export-item" onclick="exportText()">📄 Export as Plain Text</button>
            <button class="export-item" onclick="exportPDF()">🖨️ Print / Save as PDF</button>
          </div>
        </div>
        <div class="md-body" id="md-body"></div>
      </div>

      <!-- PDF Viewer -->
      <div id="pdf-viewer">
        <div class="pdf-toolbar">
          <button class="pdf-tb-btn" onclick="pdfPrevPage()">← Prev</button>
          <div class="pdf-page-nav">
            Page <input class="pdf-page-input" id="pdf-page-input" type="number" min="1" value="1" onchange="pdfGoToPage(this.value)">
            of <span id="pdf-total-pages">—</span>
          </div>
          <button class="pdf-tb-btn" onclick="pdfNextPage()">Next →</button>
          <button class="pdf-tb-btn" onclick="pdfZoomOut()">−</button>
          <span style="font-size:0.78rem;color:var(--ink3);font-family:var(--font-ui)" id="pdf-zoom-label">100%</span>
          <button class="pdf-tb-btn" onclick="pdfZoomIn()">+</button>
          <div class="pdf-spacer"></div>
          <button class="pdf-tb-btn active" id="pdf-highlight-btn" onclick="togglePdfHighlight()">🖊 Highlight</button>
          <button class="pdf-tb-btn" onclick="toggleAnnoPanel()">📝 Notes</button>
          <button class="pdf-tb-btn" onclick="pdfExport()">Export ▾</button>
        </div>
        <div style="display:flex;flex:1;overflow:hidden">
          <div class="pdf-canvas-wrap" id="pdf-canvas-wrap"></div>
          <div id="anno-panel">
            <div class="anno-header">
              <span>Highlights</span>
              <button class="anno-close" onclick="toggleAnnoPanel()">✕</button>
            </div>
            <div class="anno-list" id="anno-list"></div>
          </div>
        </div>
      </div>

      <!-- Editor -->
      <div id="editor-screen">
        <div class="editor-header">
          <button class="editor-back" onclick="editorBack()">← Back</button>
          <input class="editor-title-input" id="editor-title" type="text" placeholder="Untitled.md" autocomplete="off" spellcheck="false">
          <button class="editor-dl-btn" onclick="downloadCurrent()">⬇</button>
          <button class="editor-save-btn" onclick="saveFile()">Save</button>
        </div>
        <div class="fmt-bar">
          <button class="fmt-btn" onclick="fmt('# ')">H1</button>
          <button class="fmt-btn" onclick="fmt('## ')">H2</button>
          <button class="fmt-btn" onclick="fmt('### ')">H3</button>
          <button class="fmt-btn" onclick="fmtWrap('**','**')"><b>B</b></button>
          <button class="fmt-btn" onclick="fmtWrap('*','*')"><i>I</i></button>
          <button class="fmt-btn" onclick="fmtWrap('`','`')">Code</button>
          <button class="fmt-btn" onclick="fmt('- ')">List</button>
          <button class="fmt-btn" onclick="fmt('1. ')">1.</button>
          <button class="fmt-btn" onclick="fmt('> ')">Quote</button>
          <button class="fmt-btn" onclick="fmtBlock('```\n','\n```')">Block</button>
          <button class="fmt-btn" onclick="fmt('- [ ] ')">☐</button>

        </div>
        <div class="preview-toggle">

          <button class="pv-btn" id="pv-preview" onclick="setMode('preview')">Preview</button>

<!-- Search -->
<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search in document…" autocomplete="off" autocorrect="off" spellcheck="false">
  <span class="search-count" id="search-count"></span>
  <button class="search-close" onclick="closeSearch()">✕</button>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Name your file</div>
    <input class="modal-input" id="modal-input" type="text" placeholder="my-notes.md" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
      <button class="modal-btn primary" id="modal-confirm">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".md,.markdown,.txt,.pdf">

<script>
/* ── PDF.js worker ── */
if(typeof pdfjsLib!=='undefined') pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

/* ── State ── */
let currentMd='', currentFilename='', currentSavedId=null, currentFileType='md';
let editorMode='write', focusMode=false, sidebarOpen=true;
let searchMatches=[], searchIndex=0;
let fontSizePx=parseInt(localStorage.getItem('teqdocs-font')||'18');
let isDark=localStorage.getItem('teqdocs-theme')==='dark';
let activeTab='open';

/* PDF state */
let pdfDoc=null, pdfCurrentPage=1, pdfTotalPages=0, pdfScale=1.5;
let pdfHighlightMode=false, pdfHighlights=[], pdfCurrentFilename='';
let annoPanelOpen=false;

/* ── Init ── */
applyTheme(); renderSaved(); renderRecent(); renderHighlights();

/* ── Sidebar tabs ── */
function switchSbTab(tab) {
  document.querySelectorAll('.sb-tab').forEach((t,i)=>t.classList.toggle('active',['library','contents','notes'][i]===tab));
  document.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('sb-'+tab).classList.add('active');
}
function toggleSidebar() {
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
}

/* ── File open ── */
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0]; if(file) loadFileByType(file); e.target.value='';
});
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('drop-overlay').classList.add('active');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('drop-overlay').classList.remove('active');});
document.addEventListener('drop',e=>{
  e.preventDefault();document.getElementById('drop-overlay').classList.remove('active');
  const file=e.dataTransfer.files[0]; if(file) loadFileByType(file);
});
function loadFileByType(file) {
  const name=file.name.toLowerCase();
  if(name.endsWith('.pdf')) loadPDF(file);
  else loadMD(file);
}
function loadMD(file) {
  const r=new FileReader();
  r.onload=e=>{currentMd=e.target.result;currentFilename=file.name;currentSavedId=null;currentFileType='md';addRecent(file.name,currentMd,'md');renderDoc();};
  r.readAsText(file);
}

/* ── Saved files ── */
function getSaved(){try{return JSON.parse(localStorage.getItem('teqdocs-saved')||'[]');}catch{return[];}}
function putSaved(arr){localStorage.setItem('teqdocs-saved',JSON.stringify(arr));}
function renderSaved() {
  const list=document.getElementById('saved-list'), files=getSaved();
  if(!files.length){list.innerHTML='<div style="font-size:0.75rem;color:var(--ink3);padding:8px 2px;font-style:italic;">No saved files yet</div>';return;}
  list.innerHTML='';
  files.forEach(f=>{
    const el=document.createElement('div');el.className='file-card';
    const d=new Date(f.date),ds=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const words=f.content?f.content.trim().split(/\s+/).length:0;
    el.innerHTML=`<div class="fc-name">${escapeHtml(f.name)}</div><div class="fc-meta"><span>${ds} · ${words}w</span><span class="fc-type md">MD</span></div><div class="fc-actions"><button class="fc-action" onclick="event.stopPropagation();openEditorById('${f.id}')">✏️</button><button class="fc-action del" onclick="event.stopPropagation();deleteFile('${f.id}')">🗑</button></div>`;
    el.onclick=()=>openSavedFile(f.id);list.appendChild(el);
  });
}
function openSavedFile(id) {
  const f=getSaved().find(x=>x.id===id);if(!f)return;
  currentMd=f.content;currentFilename=f.name;currentSavedId=id;currentFileType='md';
  renderDoc();document.getElementById('doc-edit-btn').style.display='block';
}
function deleteFile(id) {
  if(!confirm('Delete this file?'))return;
  putSaved(getSaved().filter(f=>f.id!==id));renderSaved();toast('File deleted');
}
function openEditorById(id) {
  const f=getSaved().find(x=>x.id===id);if(f)openEditor(f);
}

/* ── Recent ── */
function addRecent(name,content,type='md'){
  try{let r=JSON.parse(localStorage.getItem('teqdocs-recent')||'[]');r=r.filter(x=>x.name!==name);r.unshift({name,content,date:Date.now(),type});r=r.slice(0,10);localStorage.setItem('teqdocs-recent',JSON.stringify(r));}catch(e){}
}
function renderRecent(){
  const list=document.getElementById('recent-list');
  try{
    const r=JSON.parse(localStorage.getItem('teqdocs-recent')||'[]');
    if(!r.length){list.innerHTML='<div style="font-size:0.75rem;color:var(--ink3);padding:8px 2px;font-style:italic;">No recent files</div>';return;}
    list.innerHTML='';
    r.forEach(f=>{
      const el=document.createElement('div');el.className='file-card';
      const d=Math.floor((Date.now()-f.date)/86400000);
      const ds=d===0?'Today':d===1?'Yesterday':d+'d ago';
      const typeLabel=f.type==='pdf'?'<span class="fc-type pdf">PDF</span>':'<span class="fc-type md">MD</span>';
      el.innerHTML=`<div class="fc-name">${escapeHtml(f.name)}</div><div class="fc-meta"><span>${ds}</span>${typeLabel}</div>`;
      el.onclick=()=>{if(f.content){currentMd=f.content;currentFilename=f.name;currentSavedId=null;currentFileType=f.type||'md';if(f.type==='md')renderDoc();}};
      list.appendChild(el);
    });
  }catch(e){list.innerHTML='';}
}

/* ── Editor ── */
function openEditor(file) {
  hideAll();
  document.getElementById('editor-screen').classList.add('visible');
  document.getElementById('editor-title').value=file?file.name:'';
  document.getElementById('md-editor').value=file?file.content:'';
  currentSavedId=file?file.id:null;
  setMode('write');
}
function editorBack(){
  document.getElementById('editor-screen').classList.remove('visible');
  showWelcome();renderSaved();
}
function setMode(mode){
  editorMode=mode;
  const ta=document.getElementById('md-editor'),pv=document.getElementById('editor-preview');
  document.getElementById('pv-write').classList.toggle('active',mode==='write');
  document.getElementById('pv-preview').classList.toggle('active',mode==='preview');
  if(mode==='write'){ta.style.display='block';pv.classList.remove('visible');}
  else{ta.style.display='none';pv.classList.add('visible');document.getElementById('editor-preview-body').innerHTML=parseMd(ta.value);highlightCode('editor-preview-body');}
}
function saveFile(){
  const title=document.getElementById('editor-title').value.trim();
  if(!title){showModal('Name your file','my-notes.md',name=>{document.getElementById('editor-title').value=name.endsWith('.md')?name:name+'.md';doSave();});return;}
  doSave();
}
function doSave(){
  const name=document.getElementById('editor-title').value.trim()||'Untitled.md';
  const content=document.getElementById('md-editor').value;
  let files=getSaved();
  if(currentSavedId){files=files.map(f=>f.id===currentSavedId?{...f,name,content,date:Date.now()}:f);}
  else{const id='f'+Date.now();currentSavedId=id;files.unshift({id,name,content,date:Date.now()});}
  putSaved(files);addRecent(name,content,'md');toast('Saved ✓');renderSaved();
}
function downloadCurrent(){
  const name=document.getElementById('editor-title').value.trim()||'document.md';
  const content=document.getElementById('md-editor').value;
  triggerDownload(name.endsWith('.md')?name:name+'.md',content);
}
function openEditorFromReader(){
  openEditor(currentSavedId?getSaved().find(f=>f.id===currentSavedId):{id:null,name:currentFilename,content:currentMd});
}

/* ── Format helpers ── */
function fmt(prefix){const ta=document.getElementById('md-editor'),s=ta.selectionStart;const before=ta.value.slice(0,s),lineStart=before.lastIndexOf('\n')+1;const line=before.slice(lineStart),insert=line.startsWith(prefix)?'':prefix;ta.value=ta.value.slice(0,lineStart)+insert+ta.value.slice(lineStart);ta.selectionStart=ta.selectionEnd=s+insert.length;ta.focus();}
function fmtWrap(b,a){const ta=document.getElementById('md-editor'),s=ta.selectionStart,e=ta.selectionEnd;const sel=ta.value.slice(s,e)||'text';ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);ta.selectionStart=s+b.length;ta.selectionEnd=s+b.length+sel.length;ta.focus();}
function fmtBlock(b,a){const ta=document.getElementById('md-editor'),s=ta.selectionStart;const sel=ta.value.slice(s,ta.selectionEnd)||'code here';ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(ta.selectionEnd);ta.focus();}
function insertHr(){const ta=document.getElementById('md-editor'),s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\n\n---\n\n'+ta.value.slice(s);ta.selectionStart=ta.selectionEnd=s+7;ta.focus();}

/* ── Download ── */
function triggerDownload(filename,content,mime='text/markdown'){
  const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

/* ── Syntax highlighting ── */
function highlightCode(containerId){
  const el=document.getElementById(containerId)||document.getElementById('md-body');
  if(!el)return;
  el.querySelectorAll('pre code').forEach(b=>{if(typeof hljs!=='undefined')hljs.highlightElement(b);});
}

/* ── Markdown parser ── */
function parseMd(md){
  let h=md;
  h=h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="language-${lang||'plaintext'}">${code.trimEnd()}</code></pre>`);
  h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  for(let i=6;i>=1;i--) h=h.replace(new RegExp(`^#{${i}}\\s+(.+)$`,'gm'),`<h${i}>$1</h${i}>`);
  h=h.replace(/^(---|\*\*\*|___)\s*$/gm,'<hr>');
  h=h.replace(/^&gt;\s+(.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/<\/blockquote>\n<blockquote>/g,'\n');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/__(.+?)__/g,'<strong>$1</strong>');
  h=h.replace(/\*([^\s*][^*]*?)\*/g,'<em>$1</em>');
  h=h.replace(/_([^\s_][^_]*?)_/g,'<em>$1</em>');
  h=h.replace(/~~(.+?)~~/g,'<del>$1</del>');
  h=h.replace(/^- \[x\]\s+(.+)$/gim,'<li><input type="checkbox" checked disabled> $1</li>');
  h=h.replace(/^- \[ \]\s+(.+)$/gim,'<li><input type="checkbox" disabled> $1</li>');
  h=h.replace(/^[-*+]\s+(.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`);
  h=h.replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>');
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/\|(.+)\|\n\|[-:| ]+\|\n((?:\|.+\|\n?)*)/g,(_,header,body)=>{
    const ths=header.split('|').filter(s=>s.trim()).map(x=>`<th>${x.trim()}</th>`).join('');
    const rows=body.trim().split('\n').map(row=>{const tds=row.split('|').filter(s=>s.trim()).map(d=>`<td>${d.trim()}</td>`).join('');return `<tr>${tds}</tr>`;}).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  const blockTags=/^(<h[1-6]|<ul|<ol|<li|<pre|<blockquote|<hr|<table|<img)/;
  h=h.split('\n').map(line=>(blockTags.test(line.trim())||line.trim()==='')?line:`<p>${line}</p>`).join('\n');
  h=h.replace(/<p><\/p>/g,'').replace(/<p>\s*<\/p>/g,'');
  return h;
}

/* ── Read time ── */
function calcReadTime(text){const words=text.trim().split(/\s+/).filter(Boolean).length;return{words,mins:Math.max(1,Math.round(words/200))};}

/* ── Reader ── */
function renderDoc(){
  hideAll();
  const body=document.getElementById('md-body');
  body.innerHTML=parseMd(currentMd);
  body.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach((h,i)=>h.id='heading-'+i);
  highlightCode('md-body');
  document.getElementById('doc-filename').textContent=currentFilename;
  document.getElementById('hdr-doc-title').textContent=currentFilename;
  const {words,mins}=calcReadTime(currentMd);
  document.getElementById('doc-readtime').textContent=`${mins} min read`;
  document.getElementById('doc-wordcount').textContent=`${words.toLocaleString()} words`;
  document.getElementById('reader').classList.add('visible');
  buildToc();
  document.getElementById('content').scrollTo(0,0);
  closeSearch();

  // Text highlight support for MD
  body.addEventListener('mouseup',handleMdHighlight);
}

/* ── MD Text Highlighting ── */
function handleMdHighlight(){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||!sel.toString().trim()) return;
  const text=sel.toString().trim();
  const range=sel.getRangeAt(0);
  const mark=document.createElement('span');
  mark.className='td-highlight';
  mark.title='Click to remove highlight';
  mark.onclick=e=>{e.stopPropagation();const parent=mark.parentNode;while(mark.firstChild)parent.insertBefore(mark.firstChild,mark);parent.removeChild(mark);saveHighlights();renderHighlights();};
  try{range.surroundContents(mark);}catch(e){return;}
  sel.removeAllRanges();
  saveHighlights(text);
}
function saveHighlights(text){
  if(!text)return;
  let hl=JSON.parse(localStorage.getItem('teqdocs-highlights')||'[]');
  hl.unshift({text,file:currentFilename,date:Date.now()});
  hl=hl.slice(0,50);
  localStorage.setItem('teqdocs-highlights',JSON.stringify(hl));
  renderHighlights();
}
function renderHighlights(){
  const list=document.getElementById('highlights-list');
  try{
    const hl=JSON.parse(localStorage.getItem('teqdocs-highlights')||'[]');
    if(!hl.length){list.innerHTML='<div class="anno-empty">No highlights yet.<br>Select text to highlight it.</div>';return;}
    list.innerHTML='';
    hl.forEach((h,i)=>{
      const el=document.createElement('div');el.className='anno-item';
      const ds=new Date(h.date).toLocaleDateString(undefined,{month:'short',day:'numeric'});
      el.innerHTML=`<div class="anno-text">"${escapeHtml(h.text.slice(0,120))}${h.text.length>120?'…':''}"</div><div class="anno-page">${escapeHtml(h.file)} · ${ds}</div>`;
      list.appendChild(el);
    });
  }catch(e){}
}

/* ── PDF Viewer ── */
async function loadPDF(file) {
  if(typeof pdfjsLib==='undefined'){toast('PDF.js not loaded yet, please try again');return;}
  hideAll();
  pdfCurrentFilename=file.name;
  document.getElementById('hdr-doc-title').textContent=file.name;
  document.getElementById('pdf-viewer').classList.add('visible');
  toast('Loading PDF…');
  const ab=await file.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:ab}).promise;
  pdfTotalPages=pdfDoc.numPages;
  document.getElementById('pdf-total-pages').textContent=pdfTotalPages;
  pdfCurrentPage=1;
  addRecent(file.name,'','pdf');
  renderRecent();
  await renderPdfPage(pdfCurrentPage);
  toast('PDF loaded ✓');
}

async function renderPdfPage(pageNum){
  if(!pdfDoc)return;
  const wrap=document.getElementById('pdf-canvas-wrap');
  wrap.innerHTML='';
  const page=await pdfDoc.getPage(pageNum);
  const viewport=page.getViewport({scale:pdfScale});
  const container=document.createElement('div');
  container.className='pdf-page-container';
  container.style.width=viewport.width+'px';
  container.style.height=viewport.height+'px';
  const canvas=document.createElement('canvas');
  canvas.className='pdf-canvas';
  canvas.width=viewport.width;canvas.height=viewport.height;
  const ctx=canvas.getContext('2d');
  container.appendChild(canvas);

  // Text layer for selection/highlight
  const textLayerDiv=document.createElement('div');
  textLayerDiv.className='pdf-text-layer';
  textLayerDiv.style.width=viewport.width+'px';
  textLayerDiv.style.height=viewport.height+'px';
  container.appendChild(textLayerDiv);

  // Label
  const label=document.createElement('div');
  label.className='pdf-page-label';
  label.textContent=`Page ${pageNum} of ${pdfTotalPages}`;
  wrap.appendChild(container);wrap.appendChild(label);

  await page.render({canvasContext:ctx,viewport}).promise;

  // Text layer
  const textContent=await page.getTextContent();
  textContent.items.forEach(item=>{
    const tx=pdfjsLib.Util.transform(pdfjsLib.Util.transform(viewport.transform,item.transform),[1,0,0,-1,0,0]);
    const span=document.createElement('span');
    span.textContent=item.str;
    span.style.left=tx[4]+'px';span.style.top=tx[5]+'px';
    span.style.fontSize=Math.sqrt(tx[0]*tx[0]+tx[1]*tx[1])+'px';
    span.style.fontFamily=item.fontName||'sans-serif';
    textLayerDiv.appendChild(span);
  });

  // Highlight layer
  const annoLayer=document.createElement('div');
  annoLayer.className='pdf-anno-layer';
  container.appendChild(annoLayer);

  // Re-render saved highlights for this page
  const saved=JSON.parse(localStorage.getItem('teqdocs-pdf-highlights')||'[]');
  saved.filter(h=>h.file===pdfCurrentFilename&&h.page===pageNum).forEach(h=>{
    const rect=document.createElement('div');
    rect.className='pdf-highlight-rect';
    rect.style.left=h.x+'px';rect.style.top=h.y+'px';rect.style.width=h.w+'px';rect.style.height=h.h+'px';
    annoLayer.appendChild(rect);
  });

  // PDF highlight click handler
  canvas.addEventListener('mouseup',async e=>{
    if(!pdfHighlightMode)return;
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed)return;
    const text=sel.toString().trim();
    if(!text)return;
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    const hl={file:pdfCurrentFilename,page:pageNum,text,x:x-60,y:y-20,w:120,h:22,date:Date.now()};
    let hls=JSON.parse(localStorage.getItem('teqdocs-pdf-highlights')||'[]');
    hls.unshift(hl);localStorage.setItem('teqdocs-pdf-highlights',JSON.stringify(hls));
    const hrect=document.createElement('div');hrect.className='pdf-highlight-rect';
    hrect.style.left=hl.x+'px';hrect.style.top=hl.y+'px';hrect.style.width=hl.w+'px';hrect.style.height=hl.h+'px';
    annoLayer.appendChild(hrect);
    savePdfAnnotation(text,pageNum);
    sel.removeAllRanges();
    toast('Highlighted ✓');
  });

  document.getElementById('pdf-page-input').value=pageNum;
  document.getElementById('pdf-zoom-label').textContent=Math.round(pdfScale*100)+'%';
}

function savePdfAnnotation(text,page){
  let hl=JSON.parse(localStorage.getItem('teqdocs-highlights')||'[]');
  hl.unshift({text,file:pdfCurrentFilename+' p.'+page,date:Date.now()});
  hl=hl.slice(0,50);localStorage.setItem('teqdocs-highlights',JSON.stringify(hl));
  renderHighlights();
}

async function pdfNextPage(){if(pdfCurrentPage<pdfTotalPages){pdfCurrentPage++;await renderPdfPage(pdfCurrentPage);}}
async function pdfPrevPage(){if(pdfCurrentPage>1){pdfCurrentPage--;await renderPdfPage(pdfCurrentPage);}}
async function pdfGoToPage(n){const p=Math.min(pdfTotalPages,Math.max(1,parseInt(n)||1));pdfCurrentPage=p;await renderPdfPage(p);}
async function pdfZoomIn(){pdfScale=Math.min(3,pdfScale+0.25);await renderPdfPage(pdfCurrentPage);}
async function pdfZoomOut(){pdfScale=Math.max(0.5,pdfScale-0.25);await renderPdfPage(pdfCurrentPage);}

function exportText(){
  closeExportMenu();
  let t=currentMd;
  t=t.replace(/^#{1,6}\s+/gm,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/__(.+?)__/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/_(.+?)_/g,'$1').replace(/~~(.+?)~~/g,'$1').replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/!\[([^\]]*)\]\([^)]+\)/g,'[$1]').replace(/^[-*+]\s+/gm,'• ').replace(/^\d+\.\s+/gm,'').replace(/^>\s+/gm,'').replace(/^[-*_]{3,}\s*$/gm,'─────────────────────');
  triggerDownload((currentFilename.replace(/\.md$/i,'')||'document')+'.txt',t,'text/plain');
  toast('Exported as text ✓');
}

/* ── TOC ── */
function buildToc(){
  const list=document.getElementById('toc-list');
  const headings=document.querySelectorAll('#md-body h1,#md-body h2,#md-body h3');
  list.innerHTML='';
  if(!headings.length){list.innerHTML='<p class="toc-empty">No headings found</p>';return;}
  headings.forEach(h=>{
    const level=parseInt(h.tagName[1]);
    const item=document.createElement('div');item.className='toc-item';item.dataset.level=level;
    item.textContent=h.textContent;
    item.onclick=()=>{h.scrollIntoView({behavior:'smooth',block:'start'});switchSbTab('contents');};
    list.appendChild(item);
  });
}

/* ── Search ── */
function toggleSearch(){
  const p=document.getElementById('search-bar');
  p.classList.contains('open')?closeSearch():(p.classList.add('open'),setTimeout(()=>document.getElementById('search-input').focus(),100));
}
function closeSearch(){
  document.getElementById('search-bar').classList.remove('open');
  clearHighlights2();
  document.getElementById('search-input').value='';
  document.getElementById('search-count').textContent='';
}
document.getElementById('search-input').addEventListener('input',e=>doSearch(e.target.value.trim()));
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')nextMatch();if(e.key==='Escape')closeSearch();});
function doSearch(term){
  clearHighlights2();searchMatches=[];searchIndex=0;
  const countEl=document.getElementById('search-count');
  if(!term||term.length<1){countEl.textContent='';return;}
  const body=document.getElementById('md-body');
  if(!body){countEl.textContent='No results';return;}
  const nodes=[];const walker=document.createTreeWalker(body,NodeFilter.SHOW_TEXT,null,false);
  while(walker.nextNode())nodes.push(walker.currentNode);
  const re=new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  nodes.forEach(node=>{
    if(!node.parentNode)return;
    const text=node.textContent;re.lastIndex=0;
    if(!re.test(text))return;re.lastIndex=0;
    const frag=document.createDocumentFragment();let last=0,m;
    while((m=re.exec(text))!==null){
      if(m.index>last)frag.appendChild(document.createTextNode(text.slice(last,m.index)));
      const mark=document.createElement('mark');mark.textContent=m[0];frag.appendChild(mark);
      searchMatches.push(mark);last=m.index+m[0].length;
    }
    if(last<text.length)frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
  if(searchMatches.length){searchMatches[0].classList.add('current');searchMatches[0].scrollIntoView({block:'center',behavior:'smooth'});countEl.textContent=`1 / ${searchMatches.length}`;}
  else countEl.textContent='No results';
}
function nextMatch(){if(!searchMatches.length)return;searchMatches[searchIndex].classList.remove('current');searchIndex=(searchIndex+1)%searchMatches.length;searchMatches[searchIndex].classList.add('current');searchMatches[searchIndex].scrollIntoView({block:'center',behavior:'smooth'});document.getElementById('search-count').textContent=`${searchIndex+1} / ${searchMatches.length}`;}
function clearHighlights2(){document.querySelectorAll('#md-body mark').forEach(m=>{if(!m.parentNode)return;m.parentNode.replaceChild(document.createTextNode(m.textContent),m);});searchMatches=[];searchIndex=0;}
